version: '3.9'

services:
  backend:
    build:
      context: ./backend
      target: production
    container_name: trading-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGIN=http://localhost
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - trading-net

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: trading-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - trading-net

networks:
  trading-net:
    driver: bridge
